<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychStorybook Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <!-- Once this plugin package is published, you can load it from a CDN instead:
<script src="https://unpkg.com/plugin-storybook"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
    <!-- <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script> -->

  </head>

  <body></body>
  <script>
    const jsPsych = initJsPsych({
      on_finish: () => jsPsych.data.displayData(),
    });

    // Browsers block audio until the user interacts with the page, so start
    // with a button press. This also lets jsPsych preload the audio files.
    const start = {
      type: jsPsychHtmlButtonResponse,
      stimulus: "<h1>In Progress</h1><p>Click start, then listen.</p>",
      choices: ["Start"],
    };

    // The storybook trial plays each clip in the `audio` array at its
    // `time_onset` (ms). The trial ends after the last clip finishes.
    const trial = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      width: 70,
      images: [],
      highlight: [],
      animations: [],
      previous_button: { button_visible: true, button_text: "Previous" },
      replay_button: { button_visible: true, button_text: "Replay" },
      next_button: { button_visible: true, button_text: "Next" },

      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/ready.mp3", time_onset: 0 },
        { src: "sound/chimes.mp3", time_onset: 2610 },
        { src: "sound/arlo-hi.mp3", time_onset: 10625 },
        { src: "sound/chimes.mp3", time_onset: 15876 },
        { src: "sound/sarah-hi.mp3", time_onset: 23891 },
        { src: "sound/chimes.mp3", time_onset: 29462 },
        { src: "sound/mom-hi.mp3", time_onset: 37477 },
        { src: "sound/chimes.mp3", time_onset: 43088 },
        { src: "sound/dad-hi.mp3", time_onset: 51103 },
      ],
    };

    jsPsych.run([start, trial]);
  </script>
</html>
