<!DOCTYPE html>
<html>
<head>
  <title>plugin-storybook Example</title>
  <script src="https://unpkg.com/jspsych@8.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="../dist/index.browser.min.js"></script>
  <script src="../dist/extension-progress.browser.min.js"></script>
  <script src="../dist/extension-animations.browser.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.0.0/css/jspsych.css" />
  <style>
    .jspsych-content-wrapper { background: #1a1a2e; }
    .jspsych-content { max-width: 100%; padding: 0; }
  </style>
</head>
<body></body>
<script>
  const jsPsych = initJsPsych({
    extensions: [
      { type: jsPsychExtensionProgress },
      { type: jsPsychExtensionAnimations },
    ],
    on_finish: () => {
      document.querySelector('.jspsych-content-wrapper').style.background = 'white';
      jsPsych.data.displayData();
    }
  });

  const TOTAL_PAGES = 5;

  const start_screen = {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<p style="font-size: 32px; font-family: Georgia, serif; color: white;">The Bunny Story</p>',
    choices: ['Begin'],
  };

  const BUNNY_SRC = 'https://pixijs.com/assets/bunny.png';

  const pages = [
    {
      images: [
        { id: 'bg',    src: 'img/background.jpeg', x_pos: 0,  y_pos: 0,  width: 100, height: 100 },
        { id: 'bunny', src: BUNNY_SRC,              x_pos: 42, y_pos: 60, width: 16,  height: 25  },
      ],
      audio:      [{ src: 'sound/ready.mp3', time_onset: 0 }],
      highlight:  [],
      animations: [{ image_id: 'bunny', type: 'wiggle', duration: 1000, time_onset: 500 }],
    },
    {
      images: [
        { id: 'bg',    src: 'img/background.jpeg', x_pos: 0,  y_pos: 0,  width: 100, height: 100 },
        { id: 'bunny', src: BUNNY_SRC,              x_pos: 42, y_pos: 60, width: 16,  height: 25  },
      ],
      audio:      [{ src: 'sound/bunny2.mp3', time_onset: 300 }],
      highlight:  [{ image_id: 'bg', time_onset: 300, time_offset: 1500 }],
      animations: [{ image_id: 'bunny', type: 'loom',  duration: 1500, time_onset: 300  },
                   { image_id: 'bunny', type: 'shake', duration: 600,  time_onset: 2000 }],
    },
    {
      images: [
        { id: 'bg',    src: 'img/background.jpeg', x_pos: 0,  y_pos: 0,  width: 100, height: 100 },
        { id: 'bunny', src: BUNNY_SRC,              x_pos: 42, y_pos: 60, width: 16,  height: 25  },
      ],
      audio:      [{ src: 'sound/bunny1.mp3', time_onset: 0 }],
      highlight:  [],
      animations: [{ image_id: 'bunny', type: 'bounce',    duration: 900,  time_onset: 400  },
                   { image_id: 'bunny', type: 'translate', x: 120, y: -60, duration: 1000, time_onset: 1400 }],
    },
    {
      images: [
        { id: 'bg',    src: 'img/background.jpeg', x_pos: 0,  y_pos: 0,  width: 100, height: 100 },
        { id: 'bunny', src: BUNNY_SRC,              x_pos: 42, y_pos: 60, width: 16,  height: 25  },
      ],
      audio:      [{ src: 'sound/cat.mp3', time_onset: 0 }],
      highlight:  [{ image_id: 'bg', time_onset: 0, time_offset: 2000 }],
      animations: [{ image_id: 'bunny', type: 'fadeOut', duration: 800, time_onset: 0 },
                   { image_id: 'bunny', type: 'fadeIn',  duration: 800, time_onset: 900 }],
    },
    {
      images: [
        { id: 'bg',    src: 'img/background.jpeg', x_pos: 0,  y_pos: 0,  width: 100, height: 100 },
        { id: 'bunny', src: BUNNY_SRC,              x_pos: 42, y_pos: 60, width: 16,  height: 25  },
      ],
      audio:      [{ src: 'sound/chimes.mp3', time_onset: 200 }],
      highlight:  [],
      animations: [{ image_id: 'bunny', type: 'wiggle', duration: 800, time_onset: 200 },
                   { image_id: 'bunny', type: 'loom',   duration: 800, time_onset: 1200 }],
    },
  ];

  const timeline = pages.map((page, i) => ({
    type: jsPsychStorybook,
    images:    page.images,
    audio:     page.audio,
    highlight: page.highlight,
    extensions: [
      {
        type: jsPsychExtensionProgress,
        params: {
          show_progress_bar: true,
          total_pages:       TOTAL_PAGES,
          pages_completed:   i + 1,
          celebration_sound: i + 1 >= TOTAL_PAGES ? 'sound/tada.mp3' : null,
        },
      },
      {
        type: jsPsychExtensionAnimations,
        params: {
          animations: page.animations,
          render_mode: 'dom',
        },
      },
    ],
  }));

  jsPsych.run([start_screen, ...timeline]);
</script>
</html>
